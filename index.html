    <!-- JSON-LD: Dataset -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "Critical Node Atlas",
      "description": "A structured dataset of global critical infrastructure chokepoints across five systems: maritime shipping lanes, undersea cable hubs, financial infrastructure, semiconductor supply chains, and energy networks. Each node includes what it controls, disruption effects, historical precedents, risk classification, and cascade dependencies.",
      "url": "https://ekoa.github.io/chokepoints-project/",
      "keywords": ["chokepoints", "critical infrastructure", "supply chain", "geopolitical risk", "maritime", "submarine cables", "semiconductors", "energy", "financial infrastructure"],
      "creator": {
        "@type": "Organization",
        "name": "Critical Node Atlas"
      },
      "license": "https://creativecommons.org/licenses/by/4.0/",
      "isAccessibleForFree": true,
      "variableMeasured": [
        "shipping vessel counts",
        "cable landings",
        "financial transaction volumes",
        "energy flow volumes",
        "disruption cascade dependencies"
      ]
    }
    </script>
